name: Implementation Verification

on:
  push:
    branches:
      - feat/existing-openclaw-deployer
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run existing test suite
        id: tests
        shell: bash
        run: |
          set +e
          python3 -m unittest discover -s tests -v > /tmp/unittest.log 2>&1
          status=$?
          tail -n 100 /tmp/unittest.log
          exit "$status"
      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unittest-log
          path: /tmp/unittest.log
          if-no-files-found: error
          retention-days: 3
      - name: Validate committed JSON
        run: |
          python3 -m json.tool config/routing.json >/dev/null
          python3 -m json.tool config/commands.json >/dev/null

  deployment-lock:
    if: github.event_name == 'push' && hashFiles('deploy/requirements.lock') == ''
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/existing-openclaw-deployer
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Generate hash-locked requirements
        run: |
          python3 -m pip install pip-tools==7.6.0 typing-extensions
          pip-compile --generate-hashes --output-file deploy/requirements.lock deploy/requirements.in
      - name: Commit requirements lock
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/requirements.lock
          git commit -m "build(deploy): add hashed dependency lock"
          git push origin HEAD:feat/existing-openclaw-deployer
