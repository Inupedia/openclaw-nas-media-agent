name: Inspect Locked QAS Contract

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Start locked QAS fixture
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/qas-config /tmp/qas-inspect
          mkdir -p /tmp/qas-config /tmp/qas-inspect/source
          chmod 700 /tmp/qas-config /tmp/qas-inspect
          docker run -d \
            --name qas-inspect \
            -e TZ=Asia/Shanghai \
            -e WEBUI_USERNAME=fixture-admin \
            -e WEBUI_PASSWORD=fixture-password \
            -p 127.0.0.1:15005:5005 \
            -v /tmp/qas-config:/app/config \
            cp0204/quark-auto-save@sha256:4d97439c0cd095c5fb8ef7133ca4726c8a3f996fa319f8c049180270b61c29be
          for _ in $(seq 1 60); do
            if python3 - <<'PY'
          import urllib.request
          try:
              with urllib.request.urlopen('http://127.0.0.1:15005/', timeout=1) as response:
                  response.read(1)
              raise SystemExit(0)
          except Exception:
              raise SystemExit(1)
          PY
            then
              break
            fi
            sleep 1
          done
      - name: Capture exact source and filesystem contract
        shell: bash
        run: |
          set -euo pipefail
          docker exec qas-inspect find /app -maxdepth 5 -type f -print | sort > /tmp/qas-inspect/app-files.txt
          for source in \
            /app/app/run.py \
            /app/plugins/aria2.py \
            /app/quark_auto_save.py \
            /app/app/templates/login.html \
            /app/app/templates/index.html \
            /app/skills/quark-auto-save/scripts/qas_client.py
          do
            name="$(printf '%s' "$source" | sed 's#^/##; s#/#__#g')"
            docker cp "qas-inspect:${source}" "/tmp/qas-inspect/source/${name}" || true
          done
          docker exec qas-inspect sh -lc '
            python - <<"PY"
          import json
          import os
          from pathlib import Path
          candidates = [Path("/app/config/config/quark_config.json"), Path("/app/config/quark_config.json")]
          rows = []
          for path in candidates:
              try:
                  stat = path.stat()
                  rows.append({"path": str(path), "exists": True, "mode": oct(stat.st_mode & 0o777), "uid": stat.st_uid, "gid": stat.st_gid, "size": stat.st_size})
              except OSError as error:
                  rows.append({"path": str(path), "exists": False, "errorType": type(error).__name__})
          print(json.dumps(rows, ensure_ascii=False))
          PY
          ' > /tmp/qas-inspect/config-paths.json
      - name: Configure dummy token inside container and probe API
        shell: bash
        run: |
          set -euo pipefail
          docker exec qas-inspect python - <<'PY'
          import json
          from pathlib import Path
          candidates = [Path('/app/config/config/quark_config.json'), Path('/app/config/quark_config.json')]
          path = next((item for item in candidates if item.is_file()), None)
          if path is None:
              raise SystemExit('QAS config file not found')
          data = json.loads(path.read_text(encoding='utf-8'))
          data['token'] = 'fixture-token'
          data['cookie'] = ['fixture-cookie']
          path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          print(path)
          PY
          docker restart qas-inspect >/dev/null
          for _ in $(seq 1 60); do
            if python3 - <<'PY'
          import urllib.request
          try:
              with urllib.request.urlopen('http://127.0.0.1:15005/', timeout=1) as response:
                  response.read(1)
              raise SystemExit(0)
          except Exception:
              raise SystemExit(1)
          PY
            then
              break
            fi
            sleep 1
          done
          python3 - <<'PY'
          from __future__ import annotations
          import base64
          import json
          import urllib.error
          import urllib.parse
          import urllib.request
          from pathlib import Path

          def sanitize(value, key=''):
              sensitive = any(term in key.casefold() for term in ('cookie', 'token', 'password', 'secret', 'authorization'))
              if sensitive:
                  if isinstance(value, list):
                      return ['***'] if value else []
                  if isinstance(value, dict):
                      return {str(k): sanitize(v, str(k)) for k, v in value.items()}
                  return None if value is None else '***'
              if isinstance(value, dict):
                  return {str(k): sanitize(v, str(k)) for k, v in value.items()}
              if isinstance(value, list):
                  return [sanitize(v, key) for v in value]
              if isinstance(value, str):
                  return value.replace('fixture-token', '***').replace('fixture-cookie', '***').replace('fixture-password', '***')
              return value

          basic = 'Basic ' + base64.b64encode(b'fixture-admin:fixture-password').decode()
          variants = [
              ('anonymous', {}, {}),
              ('token-query', {'token': 'fixture-token'}, {}),
              ('basic-only', {}, {'Authorization': basic}),
              ('token-and-basic', {'token': 'fixture-token'}, {'Authorization': basic}),
              ('bearer-token', {}, {'Authorization': 'Bearer fixture-token'}),
          ]
          results = []
          for name, query, headers in variants:
              url = 'http://127.0.0.1:15005/data'
              if query:
                  url += '?' + urllib.parse.urlencode(query)
              request = urllib.request.Request(url, headers=headers)
              try:
                  with urllib.request.urlopen(request, timeout=5) as response:
                      body = response.read().decode('utf-8', errors='replace')
                      status = response.status
              except urllib.error.HTTPError as error:
                  body = error.read().decode('utf-8', errors='replace')
                  status = error.code
              except Exception as error:
                  results.append({'variant': name, 'errorType': type(error).__name__, 'message': str(error)[:120]})
                  continue
              try:
                  parsed = json.loads(body)
              except Exception:
                  parsed = {'rawLength': len(body), 'rawPrefix': body[:120]}
              results.append({'variant': name, 'status': status, 'body': sanitize(parsed)})
          Path('/tmp/qas-inspect/authenticated-data-responses.json').write_text(
              json.dumps(results, ensure_ascii=False, indent=2, sort_keys=True) + '\n', encoding='utf-8'
          )
          PY
          docker cp qas-inspect:/app/config /tmp/qas-inspect/config-final
          python3 - <<'PY'
          import json
          from pathlib import Path
          for path in Path('/tmp/qas-inspect/config-final').rglob('*.json'):
              try:
                  value = json.loads(path.read_text(encoding='utf-8'))
              except Exception:
                  continue
              def scrub(item, key=''):
                  if any(term in key.casefold() for term in ('cookie', 'token', 'password', 'secret', 'authorization')):
                      if isinstance(item, list): return ['***'] if item else []
                      if isinstance(item, dict): return {str(k): scrub(v, str(k)) for k, v in item.items()}
                      return None if item is None else '***'
                  if isinstance(item, dict): return {str(k): scrub(v, str(k)) for k, v in item.items()}
                  if isinstance(item, list): return [scrub(v, key) for v in item]
                  if isinstance(item, str): return item.replace('fixture-token', '***').replace('fixture-cookie', '***')
                  return item
              path.write_text(json.dumps(scrub(value), ensure_ascii=False, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          PY
          docker logs qas-inspect > /tmp/qas-inspect/container.log 2>&1 || true
          sed -i 's/fixture-token/***/g; s/fixture-cookie/***/g; s/fixture-password/***/g' /tmp/qas-inspect/container.log
      - name: Upload inspected contract
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qas-v1-source-contract
          path: /tmp/qas-inspect
          if-no-files-found: error
          retention-days: 3
      - name: Stop fixture
        if: always()
        run: docker rm -f qas-inspect || true
