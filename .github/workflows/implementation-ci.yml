name: Implementation Verification

on:
  push:
    branches:
      - feat/existing-openclaw-deployer
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install locked deployment dependencies
        run: python3 -m pip install --require-hashes -r deploy/requirements.lock
      - name: Run existing test suite
        id: tests
        shell: bash
        run: |
          set +e
          python3 -m unittest discover -s tests -v > /tmp/unittest.log 2>&1
          status=$?
          tail -n 100 /tmp/unittest.log
          exit "$status"
      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unittest-log
          path: /tmp/unittest.log
          if-no-files-found: error
          retention-days: 3
      - name: Validate committed JSON
        run: |
          python3 -m json.tool config/routing.json >/dev/null
          python3 -m json.tool config/commands.json >/dev/null
          python3 -m json.tool deploy/schemas/config.schema.json >/dev/null

  resolve-image-lock:
    if: github.event_name == 'pull_request' && hashFiles('deploy/versions.yaml') == ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Resolve multi-platform manifest digests
        shell: bash
        run: |
          set -euo pipefail
          : > /tmp/image-lock.tsv
          resolve() {
            component="$1"
            image="$2"
            digest="$(docker buildx imagetools inspect "$image" --format '{{.Manifest.Digest}}')"
            case "$digest" in
              sha256:????????????????????????????????????????????????????????????????) ;;
              *) echo "invalid digest for $component: $digest" >&2; exit 1 ;;
            esac
            printf '%s\t%s\t%s\n' "$component" "$image" "$digest" >> /tmp/image-lock.tsv
          }
          resolve qas cp0204/quark-auto-save:v0.8.7
          resolve pansou ghcr.io/fish2018/pansou:latest
          resolve aria2 p3terx/aria2-pro:latest
          resolve sing_box ghcr.io/sagernet/sing-box:v1.13.12
          resolve playwright mcr.microsoft.com/playwright/python:v1.61.0-noble
          cat /tmp/image-lock.tsv
      - name: Upload resolved lock
        uses: actions/upload-artifact@v4
        with:
          name: resolved-image-lock
          path: /tmp/image-lock.tsv
          if-no-files-found: error
          retention-days: 3
