name: Inspect Locked QAS Contract

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Start locked QAS fixture
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/qas-config /tmp/qas-inspect
          chmod 700 /tmp/qas-config /tmp/qas-inspect
          docker run -d \
            --name qas-inspect \
            -e TZ=Asia/Shanghai \
            -e WEBUI_USERNAME=fixture-admin \
            -e WEBUI_PASSWORD=fixture-password \
            -p 127.0.0.1:15005:5005 \
            -v /tmp/qas-config:/app/config \
            cp0204/quark-auto-save@sha256:4d97439c0cd095c5fb8ef7133ca4726c8a3f996fa319f8c049180270b61c29be
          for _ in $(seq 1 60); do
            test -f /tmp/qas-config/config/quark_config.json && break
            sleep 1
          done
      - name: Capture source structure and aria2 references
        shell: bash
        run: |
          set +e
          docker exec qas-inspect sh -lc 'find /app -maxdepth 5 -type f -print | sort' \
            > /tmp/qas-inspect/app-files.txt 2>&1
          docker exec qas-inspect sh -lc \
            'grep -R -n -i -E "aria2|push_config|def data|/data|task_suggestions|get_share_detail" /app --include="*.py" --include="*.html" --include="*.json" 2>/dev/null | head -2000' \
            > /tmp/qas-inspect/source-grep.txt 2>&1
          docker exec qas-inspect sh -lc '
            for file in $(grep -R -l -i "aria2" /app --include="*.py" 2>/dev/null | head -50); do
              echo "===== ${file} ====="
              sed -n "1,260p" "${file}"
            done
          ' > /tmp/qas-inspect/aria2-source.txt 2>&1
          docker exec qas-inspect sh -lc '
            for file in $(grep -R -l -E "task_suggestions|get_share_detail|def data|route.*data" /app --include="*.py" 2>/dev/null | head -50); do
              echo "===== ${file} ====="
              sed -n "1,340p" "${file}"
            done
          ' > /tmp/qas-inspect/api-source.txt 2>&1
          set -e
      - name: Configure dummy API token and capture authenticated response
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path
          path = Path('/tmp/qas-config/config/quark_config.json')
          data = json.loads(path.read_text(encoding='utf-8'))
          data['token'] = 'fixture-token'
          data['cookie'] = ['fixture-cookie']
          path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY
          docker restart qas-inspect >/dev/null
          for _ in $(seq 1 60); do
            if python3 - <<'PY'
          import urllib.request
          try:
              with urllib.request.urlopen('http://127.0.0.1:15005/', timeout=1) as response:
                  response.read(1)
              raise SystemExit(0)
          except Exception:
              raise SystemExit(1)
          PY
            then
              break
            fi
            sleep 1
          done
          cat > /tmp/capture_qas_api.py <<'PY'
          from __future__ import annotations
          import base64
          import json
          import urllib.parse
          import urllib.request
          import urllib.error
          from pathlib import Path

          output = Path('/tmp/qas-inspect')

          def sanitize(value, key=''):
              sensitive = any(term in key.casefold() for term in ('cookie', 'token', 'password', 'secret', 'authorization'))
              if sensitive:
                  if isinstance(value, list):
                      return ['***'] if value else []
                  if isinstance(value, dict):
                      return {str(k): sanitize(v, str(k)) for k, v in value.items()}
                  if value is None:
                      return None
                  return '***'
              if isinstance(value, dict):
                  return {str(k): sanitize(v, str(k)) for k, v in value.items()}
              if isinstance(value, list):
                  return [sanitize(v, key) for v in value]
              if isinstance(value, str):
                  return value.replace('fixture-token', '***').replace('fixture-cookie', '***').replace('fixture-password', '***')
              return value

          variants = [
              ('token-query', {'token': 'fixture-token'}, {}),
              ('basic-only', {}, {'Authorization': 'Basic ' + base64.b64encode(b'fixture-admin:fixture-password').decode()}),
              ('token-and-basic', {'token': 'fixture-token'}, {'Authorization': 'Basic ' + base64.b64encode(b'fixture-admin:fixture-password').decode()}),
          ]
          results = []
          for name, query, headers in variants:
              url = 'http://127.0.0.1:15005/data'
              if query:
                  url += '?' + urllib.parse.urlencode(query)
              request = urllib.request.Request(url, headers=headers)
              try:
                  with urllib.request.urlopen(request, timeout=5) as response:
                      body = response.read().decode('utf-8', errors='replace')
                      status = response.status
              except urllib.error.HTTPError as error:
                  body = error.read().decode('utf-8', errors='replace')
                  status = error.code
              except Exception as error:
                  results.append({'variant': name, 'errorType': type(error).__name__})
                  continue
              try:
                  parsed = json.loads(body)
              except Exception:
                  parsed = {'rawLength': len(body), 'rawPrefix': body[:120]}
              results.append({'variant': name, 'status': status, 'body': sanitize(parsed)})
          (output / 'authenticated-data-responses.json').write_text(
              json.dumps(results, ensure_ascii=False, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          PY
          python3 /tmp/capture_qas_api.py
          docker logs qas-inspect > /tmp/qas-inspect/container.log 2>&1 || true
          sed -i 's/fixture-token/***/g; s/fixture-cookie/***/g; s/fixture-password/***/g' /tmp/qas-inspect/container.log
      - name: Upload inspected contract
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qas-v1-source-contract
          path: /tmp/qas-inspect
          if-no-files-found: error
          retention-days: 3
      - name: Stop fixture
        if: always()
        run: docker rm -f qas-inspect || true
