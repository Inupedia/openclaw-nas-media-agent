<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">OpenClaw NAS Media Agent workflow</title>
  <desc id="desc">A user asks OpenClaw to search, compare, download, validate, and organize media on a NAS with confirmation gates.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="1200" height="630" rx="28" fill="url(#bg)"/>
  <circle cx="1080" cy="86" r="150" fill="#38bdf8" opacity="0.08"/>
  <circle cx="112" cy="576" r="190" fill="#22c55e" opacity="0.07"/>

  <text x="70" y="82" fill="#f8fafc" font-family="Arial, sans-serif" font-size="38" font-weight="700">OpenClaw NAS Media Agent</text>
  <text x="70" y="122" fill="#94a3b8" font-family="Arial, sans-serif" font-size="21">一句话完成：本地检索 → 候选对比 → 下载 → 校验 → 整理入库</text>

  <g filter="url(#shadow)">
    <rect x="70" y="185" width="190" height="116" rx="18" fill="#ffffff"/>
    <text x="165" y="230" text-anchor="middle" fill="#0f172a" font-family="Arial, sans-serif" font-size="22" font-weight="700">自然语言请求</text>
    <text x="165" y="266" text-anchor="middle" fill="#475569" font-family="Arial, sans-serif" font-size="17">“先预览，不要下载”</text>

    <rect x="330" y="185" width="190" height="116" rx="18" fill="#e0f2fe"/>
    <text x="425" y="230" text-anchor="middle" fill="#075985" font-family="Arial, sans-serif" font-size="22" font-weight="700">OpenClaw</text>
    <text x="425" y="266" text-anchor="middle" fill="#0369a1" font-family="Arial, sans-serif" font-size="17">理解意图并调用 Skill</text>

    <rect x="590" y="185" width="220" height="116" rx="18" fill="#dcfce7"/>
    <text x="700" y="230" text-anchor="middle" fill="#166534" font-family="Arial, sans-serif" font-size="22" font-weight="700">先检查 NAS</text>
    <text x="700" y="266" text-anchor="middle" fill="#15803d" font-family="Arial, sans-serif" font-size="17">已有则停止，追更只算缺集</text>

    <rect x="880" y="185" width="250" height="116" rx="18" fill="#fef3c7"/>
    <text x="1005" y="230" text-anchor="middle" fill="#92400e" font-family="Arial, sans-serif" font-size="22" font-weight="700">展示全部候选</text>
    <text x="1005" y="266" text-anchor="middle" fill="#a16207" font-family="Arial, sans-serif" font-size="17">画质 · 编码 · 字幕 · 大小</text>
  </g>

  <g stroke="#94a3b8" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M260 243 H322"/>
    <path d="M520 243 H582"/>
    <path d="M810 243 H872"/>
  </g>

  <rect x="70" y="356" width="1060" height="2" fill="#334155"/>
  <text x="70" y="405" fill="#f8fafc" font-family="Arial, sans-serif" font-size="25" font-weight="700">双重确认，避免误下载和误入库</text>

  <g filter="url(#shadow)">
    <rect x="70" y="445" width="230" height="112" rx="18" fill="#fee2e2"/>
    <text x="185" y="487" text-anchor="middle" fill="#991b1b" font-family="Arial, sans-serif" font-size="20" font-weight="700">① 用户选择版本</text>
    <text x="185" y="522" text-anchor="middle" fill="#b91c1c" font-family="Arial, sans-serif" font-size="16">确认后才创建下载任务</text>

    <rect x="365" y="445" width="220" height="112" rx="18" fill="#dbeafe"/>
    <text x="475" y="487" text-anchor="middle" fill="#1e40af" font-family="Arial, sans-serif" font-size="20" font-weight="700">aria2 暂存下载</text>
    <text x="475" y="522" text-anchor="middle" fill="#1d4ed8" font-family="Arial, sans-serif" font-size="16">.incoming → .ready</text>

    <rect x="650" y="445" width="190" height="112" rx="18" fill="#ede9fe"/>
    <text x="745" y="487" text-anchor="middle" fill="#5b21b6" font-family="Arial, sans-serif" font-size="20" font-weight="700">完整校验</text>
    <text x="745" y="522" text-anchor="middle" fill="#6d28d9" font-family="Arial, sans-serif" font-size="16">异常进入 quarantine</text>

    <rect x="905" y="445" width="225" height="112" rx="18" fill="#dcfce7"/>
    <text x="1017" y="487" text-anchor="middle" fill="#166534" font-family="Arial, sans-serif" font-size="20" font-weight="700">② 确认整理入库</text>
    <text x="1017" y="522" text-anchor="middle" fill="#15803d" font-family="Arial, sans-serif" font-size="16">不覆盖已有媒体</text>
  </g>

  <g stroke="#94a3b8" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M300 501 H357"/>
    <path d="M585 501 H642"/>
    <path d="M840 501 H897"/>
  </g>

  <text x="70" y="603" fill="#64748b" font-family="Arial, sans-serif" font-size="15">OpenClaw · QAS · PanSou · aria2 · NAS</text>
</svg>
