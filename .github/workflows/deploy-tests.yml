name: Deployment Tests

on:
  push:
    branches:
      - feat/existing-openclaw-deployer
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy-tests:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install locked dependencies
        run: python -m pip install --require-hashes -r deploy/requirements.lock
      - name: Run all tests
        run: python -m unittest discover -s tests -v
      - name: Validate JSON and YAML
        run: |
          python -m json.tool deploy/schemas/config.schema.json >/dev/null
          python -m json.tool config/routing.json >/dev/null
          python - <<'PY'
          from pathlib import Path
          import yaml
          for name in (
              'deploy/config.example.yaml',
              'deploy/versions.yaml',
              'deploy/docker-compose.dependencies.yml',
          ):
              value = yaml.safe_load(Path(name).read_text(encoding='utf-8'))
              assert isinstance(value, dict), name
          PY
      - name: Validate documented commands
        run: python -m unittest tests.deploy.test_docs_examples -v
