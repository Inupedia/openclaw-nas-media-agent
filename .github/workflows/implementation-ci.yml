name: Implementation Verification

on:
  push:
    branches:
      - feat/existing-openclaw-deployer
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install locked deployment dependencies
        run: python3 -m pip install --require-hashes -r deploy/requirements.lock
      - name: Run existing test suite
        shell: bash
        run: |
          set +e
          python3 -m unittest discover -s tests -v > /tmp/unittest.log 2>&1
          status=$?
          tail -n 100 /tmp/unittest.log
          exit "$status"
      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unittest-log
          path: /tmp/unittest.log
          if-no-files-found: error
          retention-days: 3
      - name: Validate committed JSON
        run: |
          python3 -m json.tool config/routing.json >/dev/null
          python3 -m json.tool config/commands.json >/dev/null
          python3 -m json.tool deploy/schemas/config.schema.json >/dev/null
      - name: Build sanitized source snapshot
        if: always()
        shell: bash
        run: |
          tar \
            --exclude=.git \
            --exclude=.deploy-venv \
            --exclude=.venv \
            --exclude='deploy/config.yaml' \
            --exclude='deploy/secrets' \
            --exclude='deploy/runtime' \
            --exclude='*.db' \
            --exclude='*.db-shm' \
            --exclude='*.db-wal' \
            -czf /tmp/source-snapshot.tar.gz .
      - name: Upload source snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-snapshot
          path: /tmp/source-snapshot.tar.gz
          if-no-files-found: error
          retention-days: 1

  apply-task15-patch:
    if: github.event_name == 'pull_request'
    concurrency:
      group: existing-openclaw-task15-patch
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/existing-openclaw-deployer
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Assemble and validate patch
        id: patch
        shell: bash
        run: |
          shopt -s nullglob
          parts=(.github/task15.patch.part*)
          if [ "${#parts[@]}" -eq 0 ]; then
            echo "applied=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          cat "${parts[@]}" > /tmp/task15.patch
          git apply --check /tmp/task15.patch
          git apply /tmp/task15.patch
          rm "${parts[@]}"
          echo "applied=true" >> "$GITHUB_OUTPUT"
      - name: Install locked dependencies
        if: steps.patch.outputs.applied == 'true'
        run: python3 -m pip install --require-hashes -r deploy/requirements.lock
      - name: Verify task 15 patch
        if: steps.patch.outputs.applied == 'true'
        shell: bash
        run: |
          set +e
          {
            python3 -m unittest discover -s tests -v
            tests_status=$?
            python3 -m json.tool deploy/schemas/config.schema.json >/dev/null
            json_status=$?
            python3 -m json.tool config/routing.json >/dev/null
            routing_status=$?
            python3 - <<'PY'
          import yaml
          from pathlib import Path
          yaml.safe_load(Path('deploy/docker-compose.dependencies.yml').read_text(encoding='utf-8'))
          yaml.safe_load(Path('.github/workflows/deploy-tests.yml').read_text(encoding='utf-8'))
          PY
            yaml_status=$?
            git diff --check
            diff_status=$?
            echo "statuses tests=$tests_status json=$json_status routing=$routing_status yaml=$yaml_status diff=$diff_status"
            exit $(( tests_status || json_status || routing_status || yaml_status || diff_status ))
          } > /tmp/task15-verify.log 2>&1
          status=$?
          tail -n 160 /tmp/task15-verify.log
          exit "$status"
      - name: Upload task 15 verification log
        if: always() && steps.patch.outputs.applied == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: task15-verify-log
          path: /tmp/task15-verify.log
          if-no-files-found: error
          retention-days: 3
      - name: Commit verified task 15 business files
        if: steps.patch.outputs.applied == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git reset .github/workflows/implementation-ci.yml
          git commit -m "docs(deploy): publish deterministic existing OpenClaw workflow"
          git pull --rebase origin feat/existing-openclaw-deployer
          git push origin HEAD:feat/existing-openclaw-deployer
